<!doctype html>
<meta charset="utf-8" />
<style>
  body { width: 280px; font: 13px -apple-system, system-ui, sans-serif; background: #0e0e11; color: #ececf1; margin: 0; padding: 14px; }
  h1 { font-size: 14px; margin: 0 0 4px; }
  #sub { font-size: 11px; color: #71717a; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #status { font-size: 12px; color: #9a9aa5; min-height: 16px; margin-bottom: 10px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #71717a; margin-bottom: 6px; }
  #spaces { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; margin-bottom: 10px; }
  .space { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; padding: 9px 11px; border-radius: 10px; border: 1px solid #2a2a31; background: #17171c; color: #ececf1; cursor: pointer; text-align: left; font-size: 13px; }
  .space:hover { border-color: #4a4a55; }
  .space:disabled { opacity: .5; cursor: default; }
  .space .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .space .count { flex: none; font-size: 11px; color: #8a8a93; background: #23232b; border-radius: 999px; padding: 1px 8px; }
  .space.last { border-color: #7c5cff; }
  a { color: #b9a5ff; font-size: 12px; text-decoration: none; }
</style>
<h1>Mood Clipper</h1>
<div id="sub"></div>
<div id="status">Checking…</div>
<label>Save this page to</label>
<div id="spaces"></div>
<a href="#" id="settings">Settings</a>
<script src="popup.js"></script>
