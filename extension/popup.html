<!doctype html>
<meta charset="utf-8" />
<style>
  body { width: 250px; font: 13px -apple-system, system-ui, sans-serif; background: #0e0e11; color: #ececf1; margin: 0; padding: 14px; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #71717a; margin-bottom: 4px; }
  select { width: 100%; padding: 8px 10px; border-radius: 10px; border: 1px solid #2a2a31; background: #17171c; color: #ececf1; margin-bottom: 10px; }
  button { width: 100%; padding: 9px 12px; border-radius: 10px; border: none; background: #7c5cff; color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
  button:disabled { opacity: .5; cursor: default; }
  #status { font-size: 12px; color: #9a9aa5; min-height: 16px; margin-bottom: 10px; }
  a { color: #b9a5ff; font-size: 12px; text-decoration: none; }
</style>
<h1>Mood Clipper</h1>
<div id="status">Checking…</div>
<label for="space">Save to</label>
<select id="space"></select>
<button id="capture">📸 Capture this page</button>
<a href="#" id="settings">Settings</a>
<script src="popup.js"></script>
